<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Findly — Чиний үнэнч туслах</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mongolian&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="shell">

  <!-- Ambient background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="card">

    <!-- ── HEADER ── -->
    <header class="header">
      <div class="avatar-wrap">
        <img src="/static/images/bot.png" class="avatar" alt="Findly">
        <span class="status-dot"></span>
      </div>
      <div class="header-text">
        <h1>Findly</h1>
        <p>Онлайн · Zeely туслах</p>
      </div>
    </header>

    <!-- ── QUICK SUGGESTIONS ── -->
    <div class="suggestions" id="suggestions">
      <button class="chip" onclick="sendSuggestion('Зээлийн нөхцөл')">💳 Зээлийн нөхцөл</button>
      <button class="chip" onclick="sendSuggestion('Апп татах')">📲 Апп татах</button>
      <button class="chip" onclick="sendSuggestion('Нууц үг сэргээх')">🔐 Нууц үг</button>
      <button class="chip" onclick="sendSuggestion('Салбар хаяг')">📍 Хаяг</button>
      <button class="chip" onclick="sendSuggestion('Холбоо барих')">📞 Холбоо</button>
    </div>

    <!-- ── CHAT AREA ── -->
    <main class="chat" id="chat" role="log" aria-live="polite">
      <!-- Welcome message injected by JS -->
    </main>

    <!-- ── TYPING INDICATOR ── -->
    <div class="typing-row" id="typingRow" style="display:none">
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>
      <p class="typing-label">Findly бичиж байна...</p>
    </div>

    <!-- ── INPUT ── -->
    <footer class="input-area">
      <input
        id="msg"
        type="text"
        placeholder="Асуулт бичнэ үү..."
        autocomplete="off"
        maxlength="500"
        aria-label="Чат мессеж"
      />
      <button class="send-btn" id="sendBtn" onclick="send()" aria-label="Илгээх">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </footer>

  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
